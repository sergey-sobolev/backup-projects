# Пример конфигурации резервного копирования.
# Скопируйте в backup-config.yaml и отредактируйте.
# Удалённый сервер (user@host:/path, rsync по SSH): см. config.remote.example.yaml

# Цель по умолчанию: локальный путь или rsync-цель (user@host:/path).
# У источника: target или targets; в targets у каждой цели может быть свой mode (см. закомментированные примеры).
target: /media/usb/backup

# Режим по умолчанию для источников без своего mode (устаревший ключ mode тоже принимается).
#   update — инкрементальное обновление каталога назначения (rsync)
#   copy   — новая копия с меткой времени при каждом запуске
#   tgz    — архив .tgz, затем перенос архива(ов) через rsync
default_mode: update

# Список каталогов-источников (строка или объект с path; опционально name, mode, target или targets)
sources:
  - /home/user/projects/myapp
  - path: /home/user/documents
    name: docs
  # Несколько целей: строки (режим = mode источника) и объекты { target, mode? }
  # - path: /home/user/photos
  #   mode: update
  #   targets:
  #     - /media/usb/photos
  #     - target: user@nas:/backups/photos
  #       mode: update
  #     - target: /media/usb/photos-tgz-drop
  #       mode: tgz
  # - path: /home/user/snapshot-me
  #   mode: copy
  #   target: /media/usb/snapshots

# Файл-флаг успеха (после всех операций). Путь относительно корневого target (не per-source).
# Для удалённого корневого target флаг передаётся туда же через rsync.
success_flag: .backup-success

# Имя файла журнала в каталоге состояния ($XDG_STATE_HOME/backup-projects/ или
# ~/.local/state/backup-projects/), если log_file не задан как полный путь.
log_filename: backup.log

# Полный путь к журналу (имеет приоритет над log_filename). true — каталог по умолчанию + log_filename;
# false — только stderr. Опция CLI -l переопределяет оба ключа.
# log_file: /var/log/backup-projects.log

# Для mode: update — удалять на приёмнике файлы, которых нет в источнике (как зеркало)
sync_delete: false

# Для mode: tgz — если true, имя архива: <name>_YYYYMMDDHHMMSS.tgz вместо <name>-YYYYmmdd_HHMMSS.tgz
# tgz_datetime_suffix: true

# Ротация .tgz на локальной цели (после бэкапа оставить не больше max_count новейших архивов с тем же name)
# Можно задать в корне, у источника или у элемента targets: { target: ..., rotate: true, max_count: 5 }
# rotate: true
# max_count: 5

# rsync: дополнительные аргументы (строка или список)
# rsync_extra: ["--exclude", ".git"]
